font:
  size: 14.0
  normal:
    # family: "MesloLGS NF"
    family: "Liga SFMono Nerd Font"
  bold:
    # family: "MesloLGS NF"
    family: "Liga SFMono Nerd Font"
  italics:
    # family: "MesloLGS NF"
    family: "Liga SFMono Nerd Font"


